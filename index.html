var step=1,selected={},skipped={who:false,what:false,when:false,where:false,why:false,how:false},wheelKey='',wheelItems=[],rot=0,spinning=false;
function id(x){return document.getElementById(x)}function all(s){return Array.prototype.slice.call(document.querySelectorAll(s))}function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}function flash(t){var f=id('tap');f.textContent=t;f.classList.add('show');clearTimeout(f._t);f._t=setTimeout(function(){f.classList.remove('show')},450)}function status(t){var e=id('statusline');if(e)e.textContent=t||''}
function btns(k){return DATA[k].map(function(v){return '<button type="button" class="choice" data-action="choice" data-key="'+k+'" data-value="'+esc(v)+'">'+esc(v)+'</button>'}).join('')}
function nav(k,last){return '<div class="nav"><button type="button" class="back" data-action="back">← BACK</button><span class="picked" data-summary-for="'+k+'">選択：<b>未選択</b></span><button type="button" class="'+(last?'generate':'next')+'" data-action="'+(last?'generate':'next')+'">'+(last?'✦ GENERATE':'NEXT →')+'</button></div>'}
function render(){var html='<section class="step" data-step="1"><div class="card"><div class="head"><div><div class="eyebrow">STEP 1 / WHO</div><h2>誰が</h2></div></div><p class="desc">修飾語と人物を選んで主人公を作ります。</p><div class="who-row"><span>修飾語（どんな）</span><button type="button" class="roulette" data-action="roulette" data-key="adj">🎲 ROULETTE</button></div><div class="grid">'+btns('adj')+'</div><div class="who-row"><span>人物（誰）</span><button type="button" class="roulette" data-action="roulette" data-key="noun">🎲 ROULETTE</button></div><div class="grid">'+btns('noun')+'</div><div class="preview"><b>主人公</b><span id="who-preview">まだ選択されていません</span></div><div class="nav"><span class="picked" data-summary-for="who">選択：<b>未選択</b></span><button type="button" class="next" data-action="next">NEXT →</button></div></div></section>';[['2','WHAT','何を','what'],['3','WHEN','いつ','when'],['4','WHERE','どこで','where'],['5','WHY','なぜ','why'],['6','HOW','どのように','how']].forEach(function(s){html+='<section class="step" data-step="'+s[0]+'"><div class="card"><div class="head"><div><div class="eyebrow">STEP '+s[0]+' / '+s[1]+'</div><h2>'+s[2]+'</h2></div><button type="button" class="roulette" data-action="roulette" data-key="'+s[3]+'">🎲 ROULETTE</button></div><div class="grid">'+btns(s[3])+'</div>'+nav(s[3],false)+'</div></section>'});html+='<section class="step" data-step="7"><div class="card"><div class="head"><div><div class="eyebrow">STEP 7 / PHRASE</div><h2>必須フレーズ</h2></div></div><p class="desc">自由入力、または20個のフレーズから選択できます。</p><textarea id="phrase-input" placeholder="自由入力、または下の20個から選択"></textarea><div class="grid" style="margin-top:14px">'+btns('phrase')+'</div>'+nav('phrase',true)+'</div></section><div id="statusline" class="status"></div>';id('form').innerHTML=html;id('phrase-input').addEventListener('input',function(){selected.phrase=this.value;all('[data-choice="phrase"]').forEach(function(b){b.classList.remove('selected','roulette-picked')});summaries()})}

function ensureCur(){var map={2:'what',3:'when',4:'where',5:'why',6:'how'};if(step===1){if(!selected.adj)choose('adj',DATA.adj[0],false);if(!selected.noun)choose('noun',DATA.noun[0],false)}else if(map[step]&&!selected[map[step]])choose(map[step],DATA[map[step]][0],false)}function next(){flash('NEXT');ensureCur();show(step+1)}function back(){flash('BACK');show(step-1)}
function openWheel(k){flash('ROULETTE');wheelKey=k;wheelItems=DATA[k].slice();rot=0;spinning=false;id('wheelTitle').textContent=k.toUpperCase()+' ROULETTE';id('wheelResult').textContent='';id('wheelStatus').textContent='spinning...';id('wheelOverlay').classList.add('show');draw();setTimeout(spin,300)}function draw(){var c=id('wheelCanvas'),ctx=c.getContext('2d'),r=120,arc=Math.PI*2/wheelItems.length,colors=['#e8365d','#ff6b6b','#f5a623','#ff8c00','#00d4ff','#00a3c4','#a855f7','#7c3aed'];ctx.clearRect(0,0,240,240);ctx.save();ctx.translate(120,120);ctx.rotate(rot);for(var i=0;i<wheelItems.length;i++){var it=wheelItems[i];ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,-Math.PI/2+i*arc,-Math.PI/2+(i+1)*arc);ctx.closePath();ctx.fillStyle=colors[i%colors.length];ctx.fill();ctx.save();ctx.rotate(-Math.PI/2+(i+.5)*arc);ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font='700 '+Math.max(8,Math.min(12,95/it.length*1.5))+'px sans-serif';ctx.fillText(it,106,4);ctx.restore()}ctx.beginPath();ctx.arc(0,0,16,0,Math.PI*2);ctx.fillStyle='#0d0d18';ctx.fill();ctx.restore()}if(!requestAnimationFrame){window.requestAnimationFrame=function(cb){return setTimeout(function(){cb(Date.now())},16)}}function spin(){if(spinning)return;spinning=true;var two=Math.PI*2,arc=two/wheelItems.length,win=Math.floor(Math.random()*wheelItems.length),final=two*(6+Math.floor(Math.random()*5))-(win*arc+arc/2),start=rot,total=final-start,dur=3000+Math.random()*700,t0=Date.now();function tick(){var t=Math.min(1,(Date.now()-t0)/dur),e=1-Math.pow(1-t,4);rot=start+total*e;draw();if(t<1)requestAnimationFrame(tick);else{rot=final;draw();finish()}}tick()}function finish(){var two=Math.PI*2,arc=two/wheelItems.length,ang=((-rot%two)+two)%two,idx=Math.floor(ang/arc)%wheelItems.length,w=wheelItems[idx];id('wheelStatus').textContent='▼ 結果';id('wheelResult').textContent=w;choose(wheelKey,w,true);status('ROULETTE: '+w+' を選びました');spinning=false;setTimeout(function(){id('wheelOverlay').classList.remove('show')},1300)}
function ensureAll(){['adj','noun','what','when','where','why','how'].forEach(function(k){if(!selected[k])choose(k,DATA[k][0],false)})}function build(){var who=(selected.adj||'')+(selected.noun||''),p=id('phrase-input').value.trim(),s=STYLE[selected.how]||selected.how;return '【主人公】'+who+'の視点で語る\n【テーマ】'+selected.what+'を中心に\n【舞台・時間】'+selected.when+'、'+selected.where+'の情景を詳細に\n【動機】「'+selected.why+'」がサビの核心\n【スタイル】'+selected.how+' / '+s+'\n'+(p?'\n必ず含めるフレーズ：「'+p+'」\n':'')+'\n【曲構成】\n[Verse 1] 状況と情景の描写\n[Pre-Chorus] 感情の高まり\n[Chorus] テーマを凝縮した核心\n[Verse 2] 視点の深化・展開\n[Chorus] 繰り返し・強調\n[Bridge] 転換・解放\n[Outro] 余韻・締め\n\n日本語の自然なリズムで、メロディに乗りやすい歌詞を書いてください。'}function generate(){flash('GENERATE');ensureAll();var out=build(),who=selected.adj+selected.noun,s=STYLE[selected.how]||selected.how,title=(selected.what||'').split('・')[0],chips='';[['who',who],['what',selected.what],['when',selected.when],['where',selected.where],['why',selected.why],['how',selected.how]].forEach(function(p){chips+='<span class="chip '+(skipped[p[0]]?'skip':'')+'">'+(skipped[p[0]]?'🎲 ':'')+esc(p[1])+'</span>'});id('progress').style.display='none';id('form').style.display='none';id('result').innerHTML='<div class="result"><h2>GENERATED PROMPT</h2><div class="chips">'+chips+'</div><div class="meta"><div><b>Style of Music</b><span>'+esc(s)+'</span></div><div><b>Title 案</b><span>'+esc(who+'の'+title)+'</span></div></div><div class="prompt"><button type="button" class="copy" data-action="copy">COPY</button><pre id="output">'+esc(out)+'</pre></div><button type="button" class="reset" data-action="reset">↺ もう一度つくる</button></div>';window.__prompt=out;scrollTo(0,0)}function copy(){var out=window.__prompt||id('output').textContent,btn=document.querySelector('.copy');function done(){btn.textContent='COPIED!';setTimeout(function(){btn.textContent='COPY'},2000)}function fb(){var ta=document.createElement('textarea');ta.value=out;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');done()}catch(e){}document.body.removeChild(ta)}if(navigator.clipboard&&isSecureContext)navigator.clipboard.writeText(out).then(done).catch(fb);else fb()}function reset(){selected={};skipped={who:false,what:false,when:false,where:false,why:false,how:false};id('result').innerHTML='';id('form').style.display='';id('progress').style.display='flex';render();show(1)}
document.addEventListener('click',function(e){var el=e.target;while(el&&el!==document){if(el.dataset&&el.dataset.action)break;el=el.parentNode}if(!el||!el.dataset.action)return;e.preventDefault();e.stopPropagation();var a=el.dataset.action;if(a==='choice')choose(el.dataset.key,el.dataset.value,false);else if(a==='roulette')openWheel(el.dataset.key);else if(a==='next')next();else if(a==='back')back();else if(a==='generate')generate();else if(a==='copy')copy();else if(a==='reset')reset();else if(a==='close-wheel'&&!spinning&&e.target===id('wheelOverlay'))id('wheelOverlay').classList.remove('show')},true);document.addEventListener('touchend',function(e){var el=e.target;while(el&&el!==document){if(el.dataset&&el.dataset.action)break;el=el.parentNode}if(el&&el.dataset&&el.dataset.action){e.preventDefault();el.click()}},true);
id('jsStatus').textContent='JavaScript ON：ボタン操作できます';id('jsStatus').classList.add('on');render();show(1);
})();
